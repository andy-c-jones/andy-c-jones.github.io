<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Hero 02</title>
  <desc id="desc">Angular abstract color fields with warm gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="45%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="polyA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="polyB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#bg)"/>
  <polygon points="0,700 0,260 380,360 620,700" fill="url(#polyA)"/>
  <polygon points="430,0 980,0 760,430 250,290" fill="url(#polyB)"/>
  <polygon points="880,700 660,420 1140,180 1600,420 1600,700" fill="#111827" fill-opacity="0.28"/>
  <polygon points="1030,90 1370,0 1600,0 1600,240 1220,280" fill="#fef3c7" fill-opacity="0.26"/>
  <circle cx="1220" cy="520" r="220" fill="#fef9c3" fill-opacity="0.12"/>
</svg>
